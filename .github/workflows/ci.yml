name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  smoke-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install dependencies
        run: pip install -r requirements.txt
      - name: Bootstrap demo runs
        run: python scripts/bootstrap_demo_runs.py
      - name: Run smoke test
        run: python scripts/smoke_test.py
      - name: Gate candidate run
        run: python scripts/check_regressions.py --baseline baseline-qwen25-base --candidate candidate-qwen25-qlora-v1
